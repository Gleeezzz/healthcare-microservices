server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/configurations

management:
  server:
    port: 8889
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always