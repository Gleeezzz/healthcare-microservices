<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Healthcare - Tableau de bord</title>
  <link th:href="@{/css/main.css}" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">
    <span>⚕️</span> Healthcare Portal
  </div>
  <div class="nav-user">
    <span class="user-name" th:text="${#authentication.name}">drsmith</span>
    <span class="user-role">Médecin</span>
    <form th:action="@{/logout}" method="post" style="display: inline;">
      <button type="submit" class="btn-nav-logout">Déconnexion</button>
    </form>
  </div>
</nav>

<main class="dashboard-content">
  <div class="dashboard-card">
    <div class="welcome-icon">👋</div>
    <h2>Bienvenue, <span th:text="${#authentication.name}">Utilisateur</span> !</h2>
    <p class="subtitle">Vous êtes connecté à votre espace de gestion médicale sécurisé.</p>

    <hr class="divider">

    <div class="quick-actions">
      <h3>Actions rapides</h3>
      <div class="actions-grid">
        <a th:href="@{/patients}" class="action-item">
          <span class="action-icon">👥</span>
          <span class="action-title">Gérer les Patients</span>
        </a>
        <a href="#" class="action-item">
          <span class="action-icon">📅</span>
          <span class="action-title">Mon Agenda</span>
        </a>
      </div>
    </div>
  </div>
</main>

</body>
</html>
