server:
  port: 8083

spring:
  application:
    name: webapp
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        enabled: true
        register: true
        instance-id: webapp-8083

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

logging:
  level:
    org.springframework.security: DEBUG