<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthcare - Inscription</title>
    <link th:href="@{/css/main.css}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <h2>⚕️ Healthcare</h2>
        <p class="subtitle">Créez votre compte professionnel</p>

        <form th:action="@{/signup}" th:object="${user}" method="post">
            <div class="form-group">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" th:field="*{username}" id="username" placeholder="ex: drsmith" required autocomplete="username"/>
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" th:field="*{password}" id="password" placeholder="••••••••" required autocomplete="new-password"/>
            </div>

            <button type="submit" class="btn-submit">S'inscrire</button>
        </form>

        <div class="login-footer">
            <p>Déjà inscrit ? <a th:href="@{/login}">Se connecter</a></p>
        </div>
    </div>
</div>

</body>
</html>
