server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/healthcare
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        enabled: true
        register: true
        instance-id: patient-service-8081
  management:
    endpoints:
      web:
        exposure:
          include: health